<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Semana</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Mi Semana</h1>

<div class="planner">

  <div class="cell header">Hora</div>
  <div class="cell header">Lunes</div>
  <div class="cell header">Martes</div>
  <div class="cell header">Miércoles</div>
  <div class="cell header">Jueves</div>
  <div class="cell header">Viernes</div>
  <div class="cell header">Sábado</div>
  <div class="cell header">Domingo</div>

  <!-- FILA 08 -->
  <div class="cell time">08:00</div>
  <div class="cell slot" data-day="Lunes" data-hour="08:00"></div>
  <div class="cell slot" data-day="Martes" data-hour="08:00"></div>
  <div class="cell slot" data-day="Miércoles" data-hour="08:00"></div>
  <div class="cell slot" data-day="Jueves" data-hour="08:00"></div>
  <div class="cell slot" data-day="Viernes" data-hour="08:00"></div>
  <div class="cell slot" data-day="Sábado" data-hour="08:00"></div>
  <div class="cell slot" data-day="Domingo" data-hour="08:00"></div>

  <!-- FILA 09 -->
  <div class="cell time">09:00</div>
  <div class="cell slot" data-day="Lunes" data-hour="09:00"></div>
  <div class="cell slot" data-day="Martes" data-hour="09:00"></div>
  <div class="cell slot" data-day="Miércoles" data-hour="09:00"></div>
  <div class="cell slot" data-day="Jueves" data-hour="09:00"></div>
  <div class="cell slot" data-day="Viernes" data-hour="09:00"></div>
  <div class="cell slot" data-day="Sábado" data-hour="09:00"></div>
  <div class="cell slot" data-day="Domingo" data-hour="09:00"></div>

  <!-- FILA 10 -->
  <div class="cell time">10:00</div>
  <div class="cell slot" data-day="Lunes" data-hour="10:00"></div>
  <div class="cell slot" data-day="Martes" data-hour="10:00"></div>
  <div class="cell slot" data-day="Miércoles" data-hour="10:00"></div>
  <div class="cell slot" data-day="Jueves" data-hour="10:00"></div>
  <div class="cell slot" data-day="Viernes" data-hour="10:00"></div>
  <div class="cell slot" data-day="Sábado" data-hour="10:00"></div>
  <div class="cell slot" data-day="Domingo" data-hour="10:00"></div>

</div>

<script src="app.js"></script>

</body>
</html>
